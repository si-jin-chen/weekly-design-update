<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Amy - Weekly Design Updates</title>
<style>
*{box-sizing:border-box;margin:0}
:root{
  --bg:#13161c;--surface:#1e2128;--border:#2e323a;--border-h:#3a3f4a;
  --text:#cdd1d8;--text2:#8b919c;--text3:#5c6270;
  --link:#7fb8ff;--accent:#a78bfa;
  --success:#6ee7b7;--warn:#fbbf24;--danger:#fb7185;--pause:#8b919c;
}
body{
  font:14px/1.6 "Inter","Segoe UI Variable","Segoe UI",-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;
}
a{color:var(--link);text-decoration:none}
a:hover{text-decoration:underline}
.board{max-width:740px;margin:0 auto;padding:16px 12px 32px}
.header{text-align:center;padding:18px 0 12px;border-bottom:1px solid var(--border);margin-bottom:20px}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.header .date{font-size:12px;color:var(--text2);margin-top:2px}
.week-select{margin-top:8px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;outline:none}
.week-select:focus{border-color:var(--link)}
.section{margin-bottom:24px}
.section-head{font-size:15px;font-weight:700;color:var(--text);padding:0 0 8px;margin-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.section-head .emoji{font-size:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.card:hover{border-color:var(--border-h)}
.card-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;flex-wrap:wrap}
.card-title{font-size:14px;font-weight:600;color:var(--text)}
.card-links{display:flex;gap:8px;font-size:12px;color:var(--text2);flex-shrink:0;flex-wrap:wrap;align-items:center}
.card-links a{color:var(--link);font-size:12px;cursor:pointer}
.card-links a.placeholder{color:var(--text3);border-bottom:1px dashed var(--text3)}
.card-links .edit-link{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:0 2px;vertical-align:middle}
.card-links .edit-link:hover{color:var(--link)}
.card-links .add-link{width:18px;height:18px;border-radius:50%;border:1px dashed var(--text3);background:transparent;color:var(--text3);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;position:relative}
.card-links .add-link:hover{border-color:var(--link);color:var(--link)}
.add-menu{position:absolute;top:100%;right:0;margin-top:4px;background:var(--surface);border:1px solid var(--border-h);border-radius:6px;padding:4px 0;z-index:50;min-width:140px;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.add-menu button{display:block;width:100%;text-align:left;padding:6px 12px;border:none;background:none;color:var(--text);font-size:12px;cursor:pointer}
.add-menu button:hover{background:rgba(127,184,255,.1)}
.link-edit-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.link-edit-box{background:var(--surface);border:1px solid var(--border-h);border-radius:10px;padding:16px;width:360px;max-width:90vw}
.link-edit-box h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px}
.link-edit-box label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.link-edit-box input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;margin-bottom:10px;outline:none}
.link-edit-box input:focus{border-color:var(--link)}
.link-edit-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.link-edit-actions button{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;cursor:pointer}
.link-edit-actions button.primary{background:var(--link);color:#13161c;border-color:var(--link)}
.link-edit-actions button.danger{color:var(--danger);border-color:var(--danger)}
.status-line{font-size:13px;color:var(--text2);margin-top:4px}
.status-tag{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:2px 6px;border-radius:3px;margin-right:6px;vertical-align:1px}
.status-tag.progress{background:rgba(127,184,255,.1);color:var(--link)}
.status-tag.done{background:rgba(110,231,183,.12);color:var(--success)}
.status-tag.pause{background:rgba(139,145,156,.12);color:var(--pause)}
.status-tag.warn{background:rgba(251,191,36,.1);color:var(--warn)}
.status-tag.kickoff{background:rgba(167,139,250,.1);color:var(--accent)}
.card-body{margin-top:8px;font-size:13px;color:var(--text2)}
.card-body ul{padding-left:18px;margin:4px 0 0}
.card-body li{margin-bottom:3px}
.card-body strong{color:var(--text);font-weight:600}
.next-step{margin-top:8px;font-size:13px;color:var(--text)}
.next-step strong{font-weight:600}
.note{margin-top:8px;font-size:13px;color:var(--text2)}
.note strong{color:var(--text);font-weight:600}
.gallery{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;position:relative;padding:4px}
.gallery .thumb{width:160px;height:107px;border-radius:6px;overflow:visible;position:relative;border:1px solid var(--border);background:#10131a;cursor:default;flex-shrink:0}
.gallery .thumb img{width:100%;height:100%;object-fit:cover;display:block;border-radius:6px;pointer-events:none}
.gallery .thumb .remove{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;font-size:11px;line-height:18px;text-align:center;cursor:pointer;display:none;z-index:2}
.gallery .thumb:hover .remove{display:block}
.gallery .thumb .resize-handle{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:nwse-resize;z-index:2;opacity:0}
.gallery .thumb:hover .resize-handle{opacity:1}
.gallery .thumb .resize-handle::after{content:'';position:absolute;bottom:2px;right:2px;width:8px;height:8px;border-right:2px solid rgba(255,255,255,.5);border-bottom:2px solid rgba(255,255,255,.5)}
.gallery .add-btn{width:120px;height:80px;border-radius:6px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gallery .add-btn:hover{border-color:var(--border-h);color:var(--text2)}
.gallery .close-gallery{position:relative;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:12px;line-height:20px;text-align:center;cursor:pointer;display:none;border:none;padding:0;flex-shrink:0;align-self:center}
.gallery:hover .close-gallery{display:flex;align-items:center;justify-content:center}
details{border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden}
summary{padding:10px 12px;font-size:13px;font-weight:600;color:var(--text);background:var(--surface);cursor:pointer;list-style:none}
summary::-webkit-details-marker{display:none}
pre{padding:12px;font:12px/1.5 "SF Mono",Consolas,monospace;color:var(--text2);white-space:pre-wrap;background:var(--bg);margin:0}
.backlog-list{font-size:13px;color:var(--text2);padding-left:18px}
.backlog-list li{margin-bottom:3px}
</style>
</head>

// ╔══════════════════════════════════════════════════════════════╗
// ║  RENDERER — you should not need to edit below this line      ║
// ╚══════════════════════════════════════════════════════════════╝

function render() {
  const app = document.getElementById("app");
  let html = "";

  // header with week selector
  const options = weeks.map((w, i) => `<option value="${i}"${w === report ? ' selected' : ''}>${esc(w.date)}</option>`).join("");
  html += `<div class="header"><h1>${report.title}</h1><select class="week-select" id="week-select">${options}</select></div>`;

  // sections
  report.sections.forEach((sec) => {
    html += `<div class="section">`;
    html += `<div class="section-head">${sec.emoji ? `<span class="emoji">${sec.emoji}</span>` : ""}${sec.heading}</div>`;
    sec.items.forEach((item) => {
      html += `<div class="card">`;
      if (item.name) {
        const linksHtml = item.links.map((l,i) => `<a href="${esc(l.href)}" target="_blank" rel="noreferrer">${esc(l.label)}</a><button class="edit-link" data-edit-idx="${i}" title="Edit link">✎</button>`).join(" ");
        html += `<div class="card-head"><span class="card-title">${esc(item.name)}</span><div class="card-links" data-item-id="${esc(item.name)}">${linksHtml}<button class="add-link" title="Add link">+</button></div></div>`;
      }
      if (item.status) {
        html += `<div class="status-line"><span class="status-tag ${item.statusClass}">${esc(item.status)}</span>${item.statusText ? esc(item.statusText) : ""}</div>`;
      }
      if (item.note) {
        html += `<div class="note"><strong>${item.note}</strong></div>`;
      }
      if (item.body.length) {
        html += `<div class="card-body"><ul>${item.body.map(b => `<li>${b}</li>`).join("")}</ul></div>`;
      }
      if (item.next) {
        html += `<div class="next-step"><strong>Next step:</strong> ${esc(item.next)}</div>`;
      }
      if (item.gallery) {
        html += `<div class="gallery" data-gallery="${esc(item.name || sec.heading)}" style="display:none"></div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  });

  // backlog
  if (report.backlog.length) {
    html += `<div class="section"><div class="section-head">Backlog</div><div class="card"><ul class="backlog-list">${report.backlog.map(b => `<li>${esc(b)}</li>`).join("")}</ul></div></div>`;
  }

  // drafts
  if (report.drafts.length) {
    html += `<div class="section"><div class="section-head">GitHub Comment Drafts</div>`;
    report.drafts.forEach((d) => {
      html += `<details><summary>${esc(d.name)}</summary><pre>${esc(d.text)}</pre></details>`;
    });
    html += `</div>`;
  }

  app.innerHTML = html;
  document.querySelectorAll("[data-gallery]").forEach(initGallery);
}

function esc(s) { if (!s) return ""; const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// gallery: add, remove, resize, drag-drop
function initGallery(container) {
  if (container.dataset.initialized) return;
  container.dataset.initialized = "true";
  // + button to pick files
  const addBtn = document.createElement("button");
  addBtn.className = "add-btn"; addBtn.textContent = "+"; addBtn.title = "Add more screenshots";
  container.appendChild(addBtn);
  addBtn.addEventListener("click", () => {
    const input = document.createElement("input"); input.type = "file"; input.accept = "image/*"; input.multiple = true;
    input.addEventListener("change", () => { [...input.files].forEach(f => addThumb(container, f)); });
    input.click();
  });
  // x button to remove entire drop zone
  const closeBtn = document.createElement("button");
  closeBtn.className = "close-gallery";
  closeBtn.textContent = "\u00d7";
  closeBtn.title = "Remove screenshot area";
  closeBtn.addEventListener("click", (e) => { e.stopPropagation(); addBtn.style.display = "none"; closeBtn.style.display = "none"; });
  container.appendChild(closeBtn);
  // drag-drop on the whole gallery area
  container.addEventListener("dragover", e => e.preventDefault());
  container.addEventListener("drop", e => { e.preventDefault(); [...e.dataTransfer.files].filter(f => f.type.startsWith("image/")).forEach(f => addThumb(container, f)); });
}
function addThumb(container, file) {
  const closeBtn = container.querySelector(".close-gallery");
  const thumb = document.createElement("div"); thumb.className = "thumb";
  const img = document.createElement("img"); img.src = URL.createObjectURL(file); thumb.appendChild(img);
  const rm = document.createElement("span"); rm.className = "remove"; rm.textContent = "×";
  rm.addEventListener("click", e => { e.stopPropagation(); thumb.remove(); }); thumb.appendChild(rm);
  // drag-to-resize handle
  const handle = document.createElement("div"); handle.className = "resize-handle";
  thumb.appendChild(handle);
  let startX, startY, startW, startH;
  handle.addEventListener("mousedown", (e) => {
    e.preventDefault(); e.stopPropagation();
    startX = e.clientX; startY = e.clientY;
    startW = thumb.offsetWidth; startH = thumb.offsetHeight;
    const onMove = (ev) => {
      const w = Math.max(60, startW + ev.clientX - startX);
      const h = Math.max(40, startH + ev.clientY - startY);
      thumb.style.width = w + "px"; thumb.style.height = h + "px";
    };
    const onUp = () => { document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });
  const addBtn = container.querySelector(".add-btn");
  if (addBtn) container.insertBefore(thumb, addBtn);
  else container.appendChild(thumb);
}

render();

// week selector
document.addEventListener("change", (e) => {
  if (e.target.id === "week-select") {
    report = weeks[+e.target.value];
    render();

});

// ── inline link editing ──

function findItem(name) {
  for (const sec of report.sections) for (const item of sec.items) if (item.name === name) return item;
  return null;
}

// click pencil to edit, click + to add
document.addEventListener("click", (e) => {
  const editBtn = e.target.closest(".edit-link");
  if (editBtn) {
    const card = editBtn.closest("[data-item-id]");
    const item = findItem(card.dataset.itemId);
    if (!item) return;
    openLinkEditor(item, +editBtn.dataset.editIdx);
    return;
  }
  const addBtn = e.target.closest(".add-link");
  if (addBtn && !addBtn.querySelector(".add-menu")) {
    const card = addBtn.closest("[data-item-id]");
    const itemName = card.dataset.itemId;
    const menu = document.createElement("div");
    menu.className = "add-menu";
    menu.innerHTML = `<button data-action="link">Add link</button><button data-action="screenshot">Add screenshots</button>`;
    addBtn.appendChild(menu);
    menu.addEventListener("click", (ev) => {
      ev.stopPropagation();
      const action = ev.target.dataset.action;
      menu.remove();
      if (action === "link") {
        const item = findItem(itemName);
        if (!item) return;
        item.links.push({ label: "New Link", href: "#" });
        openLinkEditor(item, item.links.length - 1);
      } else if (action === "screenshot") {
        let gallery = card.closest(".card").querySelector("[data-gallery]");
        if (!gallery) {
          gallery = document.createElement("div");
          gallery.className = "gallery";
          gallery.dataset.gallery = itemName;
          card.closest(".card").appendChild(gallery);
          initGallery(gallery);
        }
        gallery.style.display = "flex";
      }
    });
    setTimeout(() => {
      const dismiss = (ev2) => { if (!menu.contains(ev2.target)) { menu.remove(); document.removeEventListener("click", dismiss); } };
      document.addEventListener("click", dismiss);
    }, 0);
    return;
  }
});

// right-click removed — use the Delete button in the edit modal instead

function openLinkEditor(item, idx) {
  const link = item.links[idx];
  const overlay = document.createElement("div");
  overlay.className = "link-edit-overlay";
  overlay.innerHTML = `
    <div class="link-edit-box">
      <h3>Edit link</h3>
      <label>Label</label>
      <input id="le-label" value="${esc(link.label)}">
      <label>URL</label>
      <input id="le-href" value="${esc(link.href)}" placeholder="https://...">
      <div class="link-edit-actions">
        <button class="danger" id="le-delete">Delete</button>
        <button id="le-cancel">Cancel</button>
        <button class="primary" id="le-save">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const labelInput = overlay.querySelector("#le-label");
  const hrefInput = overlay.querySelector("#le-href");
  labelInput.focus();
  labelInput.select();

  overlay.querySelector("#le-save").onclick = () => {
    link.label = labelInput.value || "Link";
    link.href = hrefInput.value || "#";
    overlay.remove();
    render();
  };
  overlay.querySelector("#le-cancel").onclick = () => overlay.remove();
  overlay.querySelector("#le-delete").onclick = () => {
    item.links.splice(idx, 1);
    overlay.remove();
    render();
  };
  overlay.addEventListener("click", (ev) => { if (ev.target === overlay) overlay.remove(); });
  hrefInput.addEventListener("keydown", (ev) => { if (ev.key === "Enter") overlay.querySelector("#le-save").click(); });
}
</script>
</body>
</html>
